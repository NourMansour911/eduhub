services:

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    volumes:
      - eduhub_qdrant_data:/qdrant/storage
    networks:
      - backend
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: always

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    volumes:
      - eduhub_mongodata:/data/db
    networks:
      - backend
    restart: always
    ports:
      - "27017:27017"
    env_file:
      - ./env/.env.mongodb
    command: ["mongod", "--auth"]



networks:
  backend:
    driver: bridge

volumes:
  eduhub_qdrant_data:
  eduhub_mongodata: