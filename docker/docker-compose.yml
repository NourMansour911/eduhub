services:
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - eduhub_api_data:/app/storage
    networks:
      - backend
    restart: always
    env_file:
      - ./env/.env.app
    depends_on:
      - mongodb
      - qdrant
      - redis


  nginx:
    image: nginx:stable-alpine3.20-perl
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - backend
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    volumes:
      - eduhub_qdrant_data:/qdrant/storage
    networks:
      - backend
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: always

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    volumes:
      - eduhub_mongodata:/data/db
    networks:
      - backend
    restart: always
    ports:
      - "27017:27017"
    env_file:
      - ./env/.env.mongodb
    command: ["mongod", "--auth"]

  redis:
    image: redis:7.4
    container_name: chat-redis
    volumes:
      - eduhub_redis_data:/data
    networks:
      - backend
    restart: always
    env_file:
      - ./env/.env.redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes


networks:
  backend:
    driver: bridge

volumes:
  eduhub_qdrant_data:
  eduhub_mongodata:
  eduhub_api_data:
  eduhub_redis_data: